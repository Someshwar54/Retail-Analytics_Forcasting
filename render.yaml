services:
  - type: web
    name: retail-analytics-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false # Manually paste your Neon.tech URL in Render dashboard
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: false
