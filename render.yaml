services:
  - type: web
    name: retail-analytics-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: retail-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "*" # Change this to your Vercel URL after deployment
      - key: DEBUG
        value: false

databases:
  - name: retail-db
    plan: free # Note: Render free databases expire after 30 days
